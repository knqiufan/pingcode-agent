# 一键启动：SeekDB + 应用（后端 + 前端静态资源同源托管）
# 使用前请复制 backend/.env.production 并至少配置 JWT_SECRET；SEEKDB_* 由下方 environment 覆盖
services:
  seekdb:
    image: oceanbase/seekdb:latest
    ports:
      - "2881:2881"
      - "2886:2886"
    volumes:
      - ./seekdb_data:/var/lib/oceanbase
    # 与官方镜像一致：https://www.oceanbase.ai/docs/zh-CN/deploy-by-docker/
    # 若设置密码，请同时在 app 的 SEEKDB_PASSWORD 中填写相同值
    environment:
      ROOT_PASSWORD: ""

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      SEEKDB_HOST: seekdb
      SEEKDB_PORT: 2881
      SEEKDB_USER: root
      SEEKDB_PASSWORD: ""
      SEEKDB_DATABASE: pingcode_agent
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - seekdb
